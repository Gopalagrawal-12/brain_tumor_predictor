<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerebro Analytics | Clinical Imaging</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .serif-title { font-family: 'Crimson Pro', serif; }
        .clinical-border { border: 1px solid #262626; }
        .report-gradient { background: linear-gradient(180deg, #0a0a0a 0%, #000000 100%); }
    </style>
</head>
<body class="bg-black text-zinc-300 min-h-screen p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <header class="border-b border-zinc-800 pb-8 mb-12 flex flex-col md:flex-row justify-between items-start">
            <div>
                <h1 class="serif-title text-4xl text-white tracking-tight uppercase">Cerebro <span class="font-light text-zinc-500">Analytics</span></h1>
                <p class="text-zinc-500 text-xs mt-2 uppercase tracking-[0.3em]">Advanced Neural Imaging & Pathological Classification</p>
            </div>
            <div class="mt-4 md:mt-0 text-left md:text-right border-l md:border-l-0 md:border-r border-zinc-800 pl-4 md:pl-0 md:pr-4">
                <p class="text-[10px] text-zinc-600 font-bold uppercase tracking-widest">System Status</p>
                <p class="text-emerald-500 text-xs font-mono">● OPERATIONAL</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            
            <div class="lg:col-span-4 space-y-8">
                <section class="space-y-4">
                    <h2 class="text-xs font-bold text-zinc-500 uppercase tracking-widest">01. Imaging Source</h2>
                    <div class="relative group clinical-border bg-zinc-950 hover:border-zinc-500 transition-all duration-500">
                        <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                        <div class="p-2">
                            <img id="preview" class="hidden w-full aspect-square object-cover grayscale brightness-75 border border-zinc-800" />
                            <div id="dropZoneText" class="py-24 text-center">
                                <p class="text-zinc-600 text-[10px] uppercase tracking-widest">Upload DICOM/Standard MRI</p>
                            </div>
                        </div>
                    </div>
                    <button onclick="uploadImage()" id="btn" class="w-full bg-zinc-100 text-black py-4 text-[10px] font-bold uppercase tracking-[0.2em] hover:bg-white transition-all">
                        Execute Diagnostic Sequence
                    </button>
                </section>
            </div>

            <div class="lg:col-span-8">
                <div id="resultPlaceholder" class="h-full min-h-[500px] flex items-center justify-center border border-zinc-900 bg-zinc-950/20">
                    <p class="text-zinc-700 text-xs uppercase tracking-widest animate-pulse">Waiting for Data Input...</p>
                </div>

                <div id="resultArea" class="hidden space-y-10 animate-in fade-in duration-700">
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-1">
                        <div class="bg-zinc-950 p-6 clinical-border">
                            <p class="text-[9px] uppercase text-zinc-500 font-bold tracking-widest mb-2">Classification</p>
                            <h3 id="label" class="text-xl font-medium text-white tracking-tight">--</h3>
                        </div>
                        <div class="bg-zinc-950 p-6 clinical-border">
                            <p class="text-[9px] uppercase text-zinc-500 font-bold tracking-widest mb-2">Confidence Level</p>
                            <h3 id="confidence" class="text-xl font-mono text-zinc-300">--</h3>
                        </div>
                        <div class="bg-zinc-950 p-6 clinical-border">
                            <p class="text-[9px] uppercase text-zinc-500 font-bold tracking-widest mb-2">Pathology Status</p>
                            <span id="impairmentBadge" class="text-xs font-bold tracking-widest uppercase italic">--</span>
                        </div>
                    </div>

                    <div class="bg-zinc-950 p-8 clinical-border">
                        <div class="flex items-center justify-between mb-10">
                            <h2 class="text-xs font-bold text-zinc-500 uppercase tracking-[0.2em]">02. Statistical Distribution</h2>
                            <div class="h-[1px] flex-grow mx-6 bg-zinc-900"></div>
                        </div>
                        <div class="h-72">
                            <canvas id="predictionChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;

        function previewImage(event) {
            const preview = document.getElementById('preview');
            const dropZoneText = document.getElementById('dropZoneText');
            preview.src = URL.createObjectURL(event.target.files[0]);
            preview.classList.remove('hidden');
            dropZoneText.classList.add('hidden');
        }

        async function uploadImage() {
            const fileInput = document.getElementById('imageInput');
            if (fileInput.files.length === 0) return;

            const btn = document.getElementById('btn');
            btn.innerText = "Analyzing Pathological Markers...";
            btn.classList.add('opacity-30');

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                // UPDATE THIS URL TO YOUR EC2 PUBLIC IP
                const response = await fetch('http://3.27.45.153:8000/predict', { method: 'POST', body: formData });
                const data = await response.json();

                document.getElementById('resultPlaceholder').classList.add('hidden');
                document.getElementById('resultArea').classList.remove('hidden');

                document.getElementById('label').innerText = data.prediction;
                document.getElementById('confidence').innerText = (data.confidence * 100).toFixed(2) + "%";

                const badge = document.getElementById('impairmentBadge');
                const isNon = data.prediction.toLowerCase().includes("non");
                badge.innerText = isNon ? "Negative - No Impairment" : "Positive - Impairment Detected";
                badge.className = isNon ? "text-emerald-500 text-xs italic" : "text-red-500 text-xs italic";

                updateChart(data.raw_predictions[0]);

            } catch (e) {
                alert("Clinical server offline.");
            } finally {
                btn.innerText = "Execute Diagnostic Sequence";
                btn.classList.remove('opacity-30');
            }
        }

        function updateChart(probabilities) {
            const ctx = document.getElementById('predictionChart').getContext('2d');
            const labels = ["Mild", "Moderate", "None", "Very Mild"];
            
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: probabilities,
                        backgroundColor: '#ffffff',
                        hoverBackgroundColor: '#3b82f6',
                        barThickness: 12,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            max: 1, 
                            ticks: { color: '#27272a', font: { size: 9 } },
                            grid: { color: '#18181b' } 
                        },
                        x: { 
                            ticks: { color: '#52525b', font: { size: 10, weight: 'bold' } },
                            grid: { display: false } 
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
